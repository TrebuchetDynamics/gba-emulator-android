name: Build Garnacha Boy for macOS
on: [push,pull_request]
jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1 
      - name: Configure & Build 🔧 
        run: |
          mkdir build
          cd build
          cmake .. && cmake --build .
      - name: Build DMG
        run: |
          cd build
          brew install graphicsmagick imagemagick
          pip install setuptools
          npm install --global create-dmg
          create-dmg --dmg-title='Garnacha Boy' 'bin/GarnachaBoy.app' || true
          ls
          mv GarnachaBoy*.dmg "GarnachaBoy.dmg"
      - name: GH Release 🚀
        # You may pin to the exact commit or the version.
        uses: actions/upload-artifact@v4
        with:
           name: GarnachaBoy-macOS
           path: build/GarnachaBoy.dmg
