name: Build Android MVP

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native Android toolchain
        run: sdkmanager "cmake;3.18.1" "ndk;22.1.7171670"

      - name: Lint and build debug APK
        working-directory: tools/android_project
        run: ./gradlew lintDebug assembleDebug

      - name: Test mGBA core lifecycle on host
        run: |
          cmake -S mgba-android/smoke -B build/mgba-smoke -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/mgba-smoke
          ctest --test-dir build/mgba-smoke --output-on-failure

      - name: Build optimized custom mGBA app and core
        run: tools/android_project/gradlew -p mgba-android lintDebug :app:assembleBenchmark :core:assembleBenchmark

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-mvp
          path: tools/android_project/app/build/outputs/apk/debug/*.apk

      - name: Upload optimized custom mGBA APK
        uses: actions/upload-artifact@v4
        with:
          name: mgba-custom-android-benchmark
          path: mgba-android/app/build/outputs/apk/benchmark/app-benchmark.apk

      - name: Upload optimized mGBA core AAR
        uses: actions/upload-artifact@v4
        with:
          name: mgba-android-core-benchmark
          path: mgba-android/core/build/outputs/aar/core-benchmark.aar
