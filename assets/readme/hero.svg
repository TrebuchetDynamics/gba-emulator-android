    <text x="208" y="157" fill="#FFF9EE" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="700" text-anchor="middle">A</text>
    <text x="177" y="213" fill="#FFF9EE" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="700" text-anchor="middle">B</text>
