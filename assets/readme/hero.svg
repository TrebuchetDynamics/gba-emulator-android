<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Garnacha Boy</title>
  <desc id="desc">A private, offline Game Boy, Game Boy Color, and Game Boy Advance emulator for Android.</desc>

  <rect width="1200" height="400" rx="28" fill="#1E2228"/>

  <g id="title-block" transform="translate(64 58)">
    <text x="0" y="0" dominant-baseline="hanging" fill="#F5C542" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="3">OFFLINE ANDROID EMULATOR</text>
    <text x="0" y="58" dominant-baseline="hanging" fill="#FFF9EE" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="76" font-weight="800" letter-spacing="-3">Garnacha Boy</text>
    <text x="2" y="158" dominant-baseline="hanging" fill="#D7D9DE" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="29" font-weight="450">Your GB, GBC, and GBA library, entirely on-device.</text>

    <g id="metadata" transform="translate(0 238)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700">
      <rect width="142" height="44" rx="22" fill="#2B3038"/>
      <text x="71" y="28" fill="#FFF9EE" text-anchor="middle">ANDROID 7+</text>
      <rect x="158" width="112" height="44" rx="22" fill="#2B3038"/>
      <text x="214" y="28" fill="#FFF9EE" text-anchor="middle">NO ADS</text>
      <rect x="286" width="150" height="44" rx="22" fill="#2B3038"/>
      <text x="361" y="28" fill="#FFF9EE" text-anchor="middle">NO ACCOUNT</text>
    </g>
  </g>

  <g id="grape-controller-mark" transform="translate(842 42)">
    <path d="M148 54 C152 27 169 13 196 8" fill="none" stroke="#F5C542" stroke-width="12" stroke-linecap="round"/>
    <path d="M182 36 C197 13 222 8 246 21 C236 46 210 55 182 36 Z" fill="#F5C542"/>

    <circle cx="115" cy="95" r="42" fill="#8E315A"/>
    <circle cx="177" cy="95" r="42" fill="#A64067"/>
    <circle cx="84" cy="149" r="42" fill="#A64067"/>
    <circle cx="146" cy="149" r="46" fill="#7B274C"/>
    <circle cx="208" cy="149" r="42" fill="#8E315A"/>
    <circle cx="115" cy="205" r="42" fill="#8E315A"/>
    <circle cx="177" cy="205" r="42" fill="#A64067"/>
    <circle cx="146" cy="261" r="40" fill="#7B274C"/>

    <path d="M134 135 H142 V127 H151 V135 H159 V144 H151 V152 H142 V144 H134 Z" fill="#F5C542"/>

